<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reagan's Pet-Sitting</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 10px;
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 15px;
        }
        button {
            padding: 10px 16px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            margin: 4px 0;
        }
        #submitBtn {
            background-color: #4CAF50;
            color: white;
            width: 100%;
        }
        #resetBtn {
            background-color: #d9534f;
            color: white;
            width: 100%;
        }
        #addDateBtn {
            background-color: #007bff;
            color: white;
            width: 100%;
        }
        .error {
            color: red;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        ul#selectedDatesList {
            list-style: none;
            padding-left: 0;
        }
        ul#selectedDatesList li {
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .booked-note {
            font-size: 13px;
            color: #555;
            margin-top: -8px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
<h1>Welcome to Reagan's Pet Sitting!</h1>
    <h1>Reagan's Pet-Sitting</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <label>Client Name</label>
        <input type="text" name="name">

        <label>Phone Number</label>
        <input type="text" name="phone">

        <label>Pet Type</label>
        <input type="text" name="pet">

        <label>Special Requests</label>
        <textarea name="notes" rows="4"></textarea>

        <!-- Date selection -->
        <label>Select Dates</label>
        <input type="date" id="singleDatePicker">
        <div class="booked-note">
            Dates already booked will be rejected when you try to add them.
        </div>

        <button type="button" id="addDateBtn">Add Date</button>

        <!-- Hidden field that actually gets submitted -->
        <input type="hidden" id="datesField" name="dates">

        <label>Selected Dates:</label>
        <ul id="selectedDatesList"></ul>

        <button id="submitBtn" type="submit">Submit Appointment</button>
        <button id="resetBtn" type="reset">Reset Form</button>

    </form>

    <script>
        // Booked dates from Flask
        const bookedDates = new Set([
            {% for d in booked_dates %}
                "{{ d }}",
            {% endfor %}
        ]);

        const selectedDates = new Set();
        const singleDatePicker = document.getElementById("singleDatePicker");
        const datesField = document.getElementById("datesField");
        const selectedDatesList = document.getElementById("selectedDatesList");
        const addDateBtn = document.getElementById("addDateBtn");

        function refreshHiddenField() {
            datesField.value = Array.from(selectedDates).join(",");
        }

        function renderSelectedDates() {
            selectedDatesList.innerHTML = "";
            Array.from(selectedDates).sort().forEach(date => {
                const li = document.createElement("li");
                li.textContent = date;

                const btn = document.createElement("button");
                btn.textContent = "Remove";
                btn.className = "remove-btn";
                btn.onclick = () => {
                    selectedDates.delete(date);
                    renderSelectedDates();
                    refreshHiddenField();
                };

                li.appendChild(btn);
                selectedDatesList.appendChild(li);
            });
        }

        addDateBtn.addEventListener("click", () => {
            const value = singleDatePicker.value; // format: YYYY-MM-DD

            if (!value) {
                alert("Please pick a date first.");
                return;
            }

            if (bookedDates.has(value)) {
                alert("That date is already booked.");
                return;
            }

            if (selectedDates.has(value)) {
                alert("You already selected that date.");
                return;
            }

            selectedDates.add(value);
            renderSelectedDates();
            refreshHiddenField();
        });

        // Clear selected dates when form is reset
        document.querySelector("form").addEventListener("reset", () => {
            selectedDates.clear();
            renderSelectedDates();
            refreshHiddenField();
        });
    </script>

</body>
</html>
